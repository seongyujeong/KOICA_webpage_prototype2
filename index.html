  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Caught:", e);
      var overlay = document.getElementById('error-overlay');
      var text = document.getElementById('error-text');
      if (overlay && text) {
        overlay.style.display = 'block';
        text.innerText += '\n[' + new Date().toLocaleTimeString() + '] ' + e.message + '\n파일: ' + e.filename + '\n라인: ' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '') + '\n---------------------------------------\n';
      }
    });
    
    window.addEventListener('unhandledrejection', function(e) {
      console.error("Unhandled Rejection:", e.reason);
      var overlay = document.getElementById('error-overlay');
      var text = document.getElementById('error-text');
      if (overlay && text) {
        overlay.style.display = 'block';
        text.innerText += '\n[' + new Date().toLocaleTimeString() + '] Unhandled Rejection: ' + (e.reason ? (e.reason.message || e.reason.stack || e.reason) : 'Unknown') + '\n---------------------------------------\n';
      }
    });

        const [particles, setParticles] = useState([]);
        
        const audioRef = useRef(null);

        const [emailSending, setEmailSending] = useState(false);
        const [emailSent, setEmailSent] = useState(false);
        const [submittedEmail, setSubmittedEmail] = useState('');

        const handleEmailSubmit = (e) => {
          e.preventDefault();
          if (!emailInput.trim()) return;
          setEmailSending(true);
          setTimeout(() => {
            setEmailSending(false);
            setEmailSent(true);
            setSubmittedEmail(emailInput);
          }, 1500);
        };

        const handleShare = (platform) => {
          let currentUrl = 'https://climate-escape.com';
          if (window.location.protocol.startsWith('http')) {
            currentUrl = window.location.origin + window.location.pathname;
          } else {
            currentUrl = '[웹사이트 배포 후 실제 인터넷 주소(URL)로 자동 연동됩니다]';
          }
          const shareText = `[Climate Escape: 지구촌 방 탈출] 기후 불평등을 해결하기 위해 기후 행동 약속에 서명했습니다! 여러분도 난민들의 삶을 직접 체험하고 기후 정의 서약에 동참해 보세요! 🌍\n👉 게임 플레이하기: ${currentUrl}`;

          if (platform === 'X(구 트위터)') {
            // Real X (Twitter) Web Intent sharing
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
            window.open(twitterUrl, '_blank', 'width=600,height=400,noopener,noreferrer');
          } else if (platform === '인스타그램') {
            // Instagram copy description
            navigator.clipboard.writeText(shareText).then(() => {
              alert(`📸 인스타그램 공유용 텍스트와 링크가 복사되었습니다!\n\n피드/스토리에 게시하거나 프로필 링크에 넣어 친구들에게 기후 행동을 소문내 보세요!\n\n복사된 내용:\n"${shareText}"`);
            }).catch(err => {
              console.error("복사 실패:", err);
            });

                              <div>✅ {submittedEmail} (으)로 기후 서약서 사본이 발송되었습니다!</div>
                              <div className="text-[10px] text-emerald-700/80 font-normal mt-1 leading-relaxed">
                                ※ 본 웹사이트는 로컬 데모(프로토타입) 상태로, 이메일 전송은 시뮬레이션으로 처리됩니다. 실제 수신을 위해서는 EmailJS API 연동이 요구됩니다.
                              </div>
                            </div>
                          ) : (
                            <div className="space-y-2">
                              <form onSubmit={handleEmailSubmit} className="flex gap-2">
                                <input 
                                  type="email"
                                  required
                                  value={emailInput}
                                  onChange={(e) => setEmailInput(e.target.value)}
                                  placeholder="이메일 주소를 입력하세요"
                                  className="flex-grow px-4 py-3 rounded-xl bg-white border border-slate-200 text-slate-900 focus:outline-none focus:border-emerald-500 text-sm shadow-sm font-semibold"
                                  disabled={emailSending}
                                />
                                <button
                                  type="submit"
                                  disabled={emailSending}
                                  className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold rounded-xl text-sm shadow-md transition-all flex items-center gap-2 min-w-[120px] justify-center"
                                >
                                  {emailSending ? (
                                    <>
                                      <span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />
                                      전송 중...
                                    </>
                                  ) : '메일 전송'}
                                </button>
                              </form>
                              <p className="text-[10px] text-slate-400 leading-relaxed">
                                ※ 이메일 전송은 시뮬레이션 데모 모드입니다. 웹 서버에 배포한 후 이메일 API 서비스(EmailJS 등)를 연결해야 실제 네이버 등으로 메일이 전송됩니다.
                              </p>
                            </div>
                          )}
                        </div>
                      </div>
                    </>
                  )}
                  </div>

                  {/* Restart Buttons */}
                  <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                    <button
                      onClick={handleRestart}
                      className="px-8 py-4 bg-white hover:bg-slate-50 border border-slate-300 text-slate-800 font-bold rounded-xl transition-all text-base shadow-sm"
                    >
                      다른 캐릭터로 처음부터 플레이하기
                    </button>
                  </div>

                </div>
              </div>
            )}

            {/* Footer */}
            <footer className="w-full py-6 text-center border-t border-slate-200 text-xs text-slate-500 z-10 glass-panel-light mt-8">
              <div className="max-w-4xl mx-auto px-4 space-y-1">
                <p>© 2026 Climate Escape. Created for Climate Inequality Awareness.</p>
                <p className="text-slate-500">본 웹사이트는 기후 난민의 실상과 KOICA 공적원조(ODA) 사업의 필요성을 교육 목적으로 가공한 가상 인터랙티브 시나리오 게임입니다.</p>
              </div>
            </footer>

          </div>
        );
      }

      // Mount App using React 18 createRoot UMD syntax
      const container = document.getElementById('root');
      const root = createRoot(container);
      root.render(<App />);
    })();
  </script>
</body>
</html>
